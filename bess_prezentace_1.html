<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BESS — Bateriové úložiště · Kalkulačka návratnosti</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #FFFFFF;
    --bg-alt: #F5F5F3;
    --bg-soft: #FAFAF8;
    --card: #FFFFFF;
    --primary: #1F4A2E;
    --primary-dark: #133020;
    --primary-light: #2D6A41;
    --accent: #6FA86C;
    --accent-soft: #E8F0E5;
    --black: #0A0A0A;
    --black-soft: #1A1A1A;
    --amber: #D4A93C;
    --red: #E63946;
    --text: #0A0A0A;
    --text-muted: #6B6B6B;
    --border: #E8E8E5;
    --border-strong: #D0D0CC;
    --positive: #2D6A41;
    --negative: #C42E2E;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .container-narrow { max-width: 960px; margin: 0 auto; padding: 0 32px; }
  .num { font-variant-numeric: tabular-nums; }

  .eyebrow {
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 700; color: var(--primary);
  }
  .eyebrow-dark { color: var(--accent); }

  /* ========== DISPLAY TYPE ========== */
  .display {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    letter-spacing: -0.035em;
    line-height: 1.0;
  }
  h1.display { font-size: clamp(40px, 6vw, 80px); }
  h2.display { font-size: clamp(34px, 4.5vw, 56px); }
  h3.display { font-size: clamp(24px, 2.5vw, 32px); }

  /* ========== HERO ========== */
  .hero {
    background: var(--bg);
    padding: 100px 0 60px;
    border-bottom: 1px solid var(--border);
  }
  .hero-eyebrow-wrap { text-align: center; margin-bottom: 24px; }
  .hero h1 {
    text-align: center; max-width: 1000px; margin: 0 auto 24px;
  }
  .hero-sub {
    text-align: center; font-size: 19px; max-width: 680px;
    margin: 0 auto 48px; color: var(--text-muted);
  }
  .hero-stats {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; max-width: 1100px; margin: 0 auto;
  }
  .hero-stat {
    background: var(--bg-alt); border-radius: 16px;
    padding: 24px; text-align: left;
    border: 1px solid var(--border);
    transition: transform 0.2s;
  }
  .hero-stat.featured {
    background: var(--primary); color: white; border-color: var(--primary);
  }
  .hero-stat.featured .hero-stat-label,
  .hero-stat.featured .hero-stat-sub { color: rgba(255,255,255,0.7); }
  .hero-stat-label {
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600; margin-bottom: 10px;
  }
  .hero-stat-value {
    font-weight: 800; font-size: 36px; letter-spacing: -0.03em;
    line-height: 1; color: var(--primary);
  }
  .hero-stat.featured .hero-stat-value { color: white; }
  .hero-stat-sub {
    font-size: 12px; color: var(--text-muted); margin-top: 8px;
  }
  @media (max-width: 768px) {
    .hero-stats { grid-template-columns: repeat(2, 1fr); }
    .hero { padding: 60px 0 40px; }
  }

  /* ========== SECTIONS ========== */
  section { padding: 100px 0; }
  section.tight { padding: 60px 0; }
  .section-header {
    text-align: center; max-width: 760px;
    margin: 0 auto 64px;
  }
  .section-header .eyebrow { display: block; margin-bottom: 16px; }
  .section-header h2 { margin: 0 0 20px; }
  .section-header p {
    font-size: 18px; color: var(--text-muted); margin: 0;
  }

  /* ========== EMOCIONÁLNÍ VÝSLEDEK ========== */
  .result-section { background: var(--bg-soft); }
  .result-card {
    background: var(--black); color: white;
    border-radius: 24px; padding: 64px 48px;
    max-width: 960px; margin: 0 auto;
    position: relative; overflow: hidden;
  }
  .result-card::before {
    content: ''; position: absolute;
    top: -50%; right: -20%; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(111,168,108,0.15), transparent 60%);
    pointer-events: none;
  }
  .result-card > * { position: relative; z-index: 1; }
  .result-card-label {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    font-weight: 700; color: var(--accent); margin-bottom: 24px;
    text-align: center;
  }
  .result-card-big {
    font-weight: 900; font-size: clamp(72px, 12vw, 140px);
    line-height: 0.95; letter-spacing: -0.04em;
    text-align: center; color: white;
    margin: 0;
  }
  .result-card-context {
    text-align: center; font-size: 19px;
    color: rgba(255,255,255,0.8); margin: 16px auto 0;
    max-width: 600px;
  }
  .result-card-context strong { color: var(--accent); font-weight: 700; }
  .status-badge-wrap { text-align: center; margin-top: 28px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 18px; border-radius: 100px;
    font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .status-good { color: #6FA86C; }
  .status-warning { color: var(--amber); }
  .status-bad { color: #FF6B6B; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .result-card-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 24px; margin-top: 56px; padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.12);
  }
  @media (max-width: 720px) { .result-card-grid { grid-template-columns: 1fr; } }
  .result-card-grid-label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.5); font-weight: 600; margin-bottom: 8px;
  }
  .result-card-grid-value {
    font-weight: 800; font-size: 30px; line-height: 1;
    letter-spacing: -0.02em;
  }
  .result-card-grid-sub {
    font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 6px;
  }

  /* ========== BENEFIT CARDS ========== */
  .benefits-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  @media (max-width: 768px) { .benefits-grid { grid-template-columns: 1fr; } }
  .benefit-card {
    background: var(--bg-alt); border-radius: 20px;
    padding: 36px;
    border: 1px solid var(--border);
    transition: transform 0.2s, border-color 0.2s;
  }
  .benefit-card:hover { transform: translateY(-3px); border-color: var(--primary); }
  .benefit-num {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    color: var(--primary); padding: 4px 10px;
    background: var(--accent-soft); border-radius: 4px;
    margin-bottom: 20px;
  }
  .benefit-title {
    font-weight: 800; font-size: 28px; letter-spacing: -0.02em;
    margin: 0 0 12px; color: var(--black);
  }
  .benefit-claim {
    font-size: 16px; color: var(--text-muted); margin: 0 0 24px;
    line-height: 1.55;
  }
  .benefit-detail {
    background: white; padding: 18px 20px; border-radius: 12px;
    font-size: 13px; line-height: 1.65;
    border: 1px solid var(--border);
  }
  .benefit-detail strong { color: var(--primary); font-weight: 700; }
  .benefit-source {
    font-size: 11px; color: var(--text-muted);
    margin-top: 14px; line-height: 1.5;
  }
  .benefit-source a {
    color: var(--primary); text-decoration: none;
    border-bottom: 1px dotted var(--primary);
  }

  /* ========== CALCULATOR ========== */
  .calc-section { background: var(--bg-soft); }
  .calc-grid {
    display: grid; grid-template-columns: 440px 1fr; gap: 24px;
    align-items: start;
  }
  @media (max-width: 1024px) { .calc-grid { grid-template-columns: 1fr; } }

  .calc-card {
    background: white; border-radius: 14px; padding: 22px 24px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
    border-left: 4px solid var(--primary);
  }
  .calc-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; gap: 12px;
  }
  .calc-card h3 {
    margin: 0; font-size: 12px; font-weight: 700; color: var(--primary);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .calc-badge {
    background: var(--accent-soft); color: var(--primary);
    padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700;
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .slider-block { margin-bottom: 16px; }
  .slider-label-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .slider-label { font-size: 12px; font-weight: 600; color: var(--text); }
  .slider-value {
    font-size: 13px; font-weight: 700; color: var(--primary);
    background: var(--accent-soft); padding: 2px 9px; border-radius: 4px;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }
  .slider-help {
    font-size: 10.5px; color: var(--text-muted);
    margin-top: 4px; line-height: 1.4;
  }
  .slider-help em { font-style: italic; }
  input[type="number"] {
    width: 100%; padding: 7px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 6px; font-size: 13px; font-family: inherit;
    background: white;
  }
  .num-row { display: flex; gap: 8px; align-items: center; }
  .num-row span { font-size: 12px; color: var(--text-muted); }
  .preset-row { margin-bottom: 12px; }
  .preset-btn {
    padding: 5px 11px; font-size: 11px; font-weight: 600;
    background: transparent; color: var(--primary);
    border: 1.5px solid var(--primary); border-radius: 16px;
    cursor: pointer; margin-right: 5px; margin-bottom: 5px;
    transition: all 0.15s; font-family: inherit;
  }
  .preset-btn.active { background: var(--primary); color: white; }
  .calc-divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* Results panels */
  .panel {
    background: white; border-radius: 14px; padding: 28px;
    margin-bottom: 16px; border: 1px solid var(--border);
  }
  .panel h3 {
    margin: 0 0 6px 0; font-size: 20px; font-weight: 800;
    color: var(--black); letter-spacing: -0.015em;
  }
  .panel-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }

  .breakdown-row { margin-bottom: 12px; }
  .breakdown-label {
    display: flex; justify-content: space-between;
    font-size: 13px; margin-bottom: 4px;
  }
  .breakdown-name { font-weight: 600; }
  .breakdown-value { font-variant-numeric: tabular-nums; font-weight: 700; }
  .breakdown-pct { color: var(--text-muted); font-weight: 400; margin-left: 6px; }
  .breakdown-bar {
    height: 8px; background: var(--bg-alt); border-radius: 4px; overflow: hidden;
  }
  .breakdown-bar-fill { height: 100%; transition: width 0.4s; }
  .color-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; margin-right: 8px; vertical-align: middle;
  }

  /* Table */
  table { width: 100%; font-size: 12px; border-collapse: collapse; }
  thead tr { background: var(--bg-alt); color: var(--primary); }
  th { padding: 10px 6px; text-align: right; font-weight: 700; }
  th:first-child { text-align: left; }
  td { padding: 8px 6px; text-align: right; font-variant-numeric: tabular-nums; }
  td:first-child { text-align: left; font-weight: 600; }
  tbody tr { border-bottom: 1px solid var(--border); }

  .warning-box {
    background: #FFF4E5; border: 1px solid var(--amber);
    padding: 10px 12px; border-radius: 6px;
    font-size: 11px; color: #8B6B1F; margin-top: 8px;
  }

  /* ========== METHODOLOGY (BLACK SECTION) ========== */
  .methodology {
    background: var(--black); color: white; padding: 110px 0;
  }
  .methodology h2 { color: white !important; }
  .methodology .section-header p { color: rgba(255,255,255,0.7); }
  .methodology .eyebrow { color: var(--accent); }

  .method-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
  }
  @media (max-width: 768px) { .method-grid { grid-template-columns: 1fr; } }
  .method-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 28px 32px; border-radius: 14px;
    backdrop-filter: blur(10px);
  }
  .method-item h4 {
    font-weight: 800; font-size: 22px; letter-spacing: -0.015em;
    margin: 0 0 8px; color: white;
  }
  .method-item-claim {
    margin: 0 0 14px; font-size: 14px;
    color: rgba(255,255,255,0.6);
  }
  .method-formula {
    background: rgba(0,0,0,0.4); padding: 14px 16px; border-radius: 8px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px; margin: 12px 0; line-height: 1.6;
    color: var(--accent);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .method-source {
    font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 12px;
    line-height: 1.6;
  }
  .method-source a {
    color: var(--accent); text-decoration: none;
    border-bottom: 1px dotted var(--accent);
  }
  .method-source strong { color: white; }

  /* ========== TECHNOLOGY (GREEN SECTION like PDF) ========== */
  .tech-section { background: var(--primary-dark); color: white; padding: 110px 0; }
  .tech-section h2 { color: white !important; }
  .tech-section .section-header p { color: rgba(255,255,255,0.7); }
  .tech-section .eyebrow { color: var(--accent); }

  .tech-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  }
  @media (max-width: 768px) { .tech-grid { grid-template-columns: repeat(2, 1fr); } }
  .tech-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 28px; border-radius: 14px;
  }
  .tech-value {
    font-weight: 800; font-size: 42px;
    color: white; line-height: 1; margin-bottom: 8px;
    letter-spacing: -0.025em;
  }
  .tech-label {
    font-size: 13px; opacity: 0.8; font-weight: 500;
    line-height: 1.4;
  }
  .tech-label-sub { display: block; opacity: 0.6; font-size: 11px; margin-top: 4px; }

  .tech-params-wrap {
    margin-top: 40px; background: rgba(255,255,255,0.03);
    border-radius: 16px; padding: 36px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .tech-params-wrap h4 {
    font-weight: 800; font-size: 24px; letter-spacing: -0.02em;
    margin: 0 0 24px; color: white;
  }
  .tech-params {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0 40px;
  }
  @media (max-width: 600px) { .tech-params { grid-template-columns: 1fr; } }
  .tech-param-row {
    display: flex; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 14px;
  }
  .tech-param-row span:first-child { opacity: 0.65; }
  .tech-param-row span:last-child { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* timeline */
  .timeline {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 16px; margin-top: 56px;
    position: relative;
  }
  @media (max-width: 900px) {
    .timeline { grid-template-columns: 1fr; }
    .timeline-step::after { display: none !important; }
  }
  .timeline-step {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 24px 18px; border-radius: 12px;
    position: relative;
  }
  .timeline-step::after {
    content: '→'; position: absolute;
    right: -16px; top: 50%; transform: translateY(-50%);
    color: var(--accent); font-size: 20px; font-weight: 700;
    z-index: 2;
  }
  .timeline-step:last-child::after { display: none; }
  .timeline-step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); color: var(--primary-dark);
    font-weight: 800; font-size: 14px; margin-bottom: 12px;
  }
  .timeline-step-title {
    font-weight: 700; font-size: 14px; color: white;
    margin-bottom: 4px;
  }
  .timeline-step-detail {
    font-size: 11px; color: rgba(255,255,255,0.6);
    line-height: 1.4; margin-bottom: 8px;
  }
  .timeline-step-time {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--accent); text-transform: uppercase;
  }

  /* warranty grid */
  .warranty-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 12px; margin-top: 32px;
  }
  @media (max-width: 768px) { .warranty-grid { grid-template-columns: repeat(2, 1fr); } }
  .warranty-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px 16px; border-radius: 12px;
    text-align: center;
  }
  .warranty-value {
    font-weight: 800; font-size: 30px; color: var(--accent);
    line-height: 1; margin-bottom: 8px; letter-spacing: -0.02em;
  }
  .warranty-label {
    font-size: 12px; color: rgba(255,255,255,0.8);
    font-weight: 600; line-height: 1.3;
  }
  .warranty-sub {
    display: block; font-size: 10px; color: rgba(255,255,255,0.5);
    margin-top: 4px; font-weight: 400;
  }

  /* ========== FINANCING ========== */
  .financing { background: var(--bg-alt); padding: 100px 0; }
  .essox-card {
    background: white; border-radius: 24px; padding: 48px;
    border: 1px solid var(--border); max-width: 1000px; margin: 0 auto;
  }
  .essox-header {
    display: flex; align-items: center; gap: 20px; margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .essox-logo {
    background: var(--red); color: white;
    padding: 12px 22px; border-radius: 8px;
    font-weight: 900; letter-spacing: 0.08em; font-size: 18px;
  }
  .essox-tagline { font-size: 14px; color: var(--text-muted); flex: 1; }
  .essox-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
  }
  @media (max-width: 768px) { .essox-row { grid-template-columns: repeat(2, 1fr); } }
  .essox-item {
    text-align: center; padding: 24px 12px;
    background: var(--bg-alt); border-radius: 12px;
    border: 1px solid var(--border);
  }
  .essox-item-value {
    font-weight: 800; font-size: 32px; color: var(--primary);
    line-height: 1; letter-spacing: -0.025em;
  }
  .essox-item-label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 10px; font-weight: 700;
  }
  .essox-item-sub { font-size: 12px; margin-top: 4px; color: var(--text-muted); }

  /* ========== CTA ========== */
  .cta {
    background: var(--primary); color: white;
    padding: 100px 0; text-align: center;
  }
  .cta h2 { margin: 0 0 16px; color: white; }
  .cta p { font-size: 18px; opacity: 0.85; max-width: 580px; margin: 0 auto 40px; }
  .cta-contact {
    display: inline-flex; flex-direction: column; gap: 8px;
    background: rgba(255,255,255,0.08); padding: 28px 40px;
    border-radius: 16px; backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .cta-name { font-weight: 800; font-size: 22px; color: var(--accent); letter-spacing: -0.01em; }
  .cta-detail { font-size: 15px; opacity: 0.9; }

  footer {
    background: var(--black); color: rgba(255,255,255,0.6);
    padding: 32px 0; text-align: center; font-size: 12px;
  }
  footer a { color: rgba(255,255,255,0.8); text-decoration: none; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
'use strict';
const { useState, useMemo } = React;
const {
  LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
  Tooltip, Legend, ResponsiveContainer, ReferenceLine, ComposedChart, Area
} = Recharts;

const DEFAULTS = {
  bessCapacityKWh: 2411, bessPowerKW: 1250, baseInvestment: 17550000,

function pmt(rate, nper, pv) {
  if (rate === 0) return pv / nper;
  const r = rate / 12 / 100;
  const n = nper * 12;
  return (pv * r) / (1 - Math.pow(1 + r, -n));
}

function calculateProjections(inputs) {
  const x = inputs;
  const essoxAmount = x.baseInvestment * (x.essoxPct / 100);
  const bankAmount = x.baseInvestment * (x.bankPct / 100);
  const ownAmount = x.baseInvestment * (x.ownEquityPct / 100);
  const essoxMonthly = essoxAmount > 0 ? pmt(x.essoxRate, x.essoxYears, essoxAmount) : 0;
  const bankMonthly = bankAmount > 0 ? pmt(x.bankRate, x.bankYears, bankAmount) : 0;

  const peakPenaltySavings = x.peakOverrunKW * x.penaltyRate * x.overrunMonths;
  const reservedSavings = x.reservedReductionKW * x.reservedPriceRate * 12;
  const peakShavingYear = peakPenaltySavings + reservedSavings;

  const arbitrageUsable = x.bessCapacityKWh * (x.arbitrageCapacityPct / 100) * 0.93;
  const arbitrageMargin = x.sellPrice - x.buyPrice;
  const arbitrageYear = arbitrageUsable * x.arbitrageCyclesPerYear * arbitrageMargin;

  const evUsable = x.bessCapacityKWh * (x.evCapacityPct / 100) * 0.93;
  const evMargin = x.evPrice - x.evEnergyCostKWh;
  const evYearBase = evUsable * 365 * (x.evUtilizationStart / 100) * evMargin;

  const fveYear = x.fveSurplusDaily * 365 * (x.fveSelfUsePrice - x.fveBuybackPrice);
  const windYear = x.windSurplusDaily * 365 * (x.windSelfUsePrice - x.windBuybackPrice);
  const totalYearOneRevenue = peakShavingYear + arbitrageYear + evYearBase + fveYear + windYear;

  const yearly = [];
  let cumulative = -ownAmount;

  for (let year = 1; year <= x.analysisHorizon; year++) {
    const deg = Math.pow(1 - x.degradationPerYear / 100, year - 1);
    const inf = Math.pow(1 + x.electricityInflation / 100, year - 1);
    const evUtil = Math.min(95, x.evUtilizationStart * Math.pow(1 + x.evGrowthPerYear / 100, year - 1));
    const evY = evUsable * 365 * (evUtil / 100) * evMargin * inf * deg;
    const peakY = peakShavingYear * inf;
    const arbY = arbitrageYear * inf * deg;
    const fveY = fveYear * inf;
    const windY = windYear * inf;
    const revenue = peakY + arbY + evY + fveY + windY;
    const essoxAnnual = year <= x.essoxYears ? essoxMonthly * 12 : 0;
    const bankAnnual = year <= x.bankYears ? bankMonthly * 12 : 0;
    const opex = x.opexPerYear * inf;
    const netCF = revenue - essoxAnnual - bankAnnual - opex;
    cumulative += netCF;
    yearly.push({
      year, revenue: Math.round(revenue),
      peakShaving: Math.round(peakY), arbitrage: Math.round(arbY),
      ev: Math.round(evY), fve: Math.round(fveY), wind: Math.round(windY),
      essoxPayment: Math.round(essoxAnnual), bankPayment: Math.round(bankAnnual),
      opex: Math.round(opex), netCashflow: Math.round(netCF),
      cumulativeCashflow: Math.round(cumulative),
      monthlyCashflow: Math.round(netCF / 12),
    });
  }

  let paybackYear = null;
  for (let i = 0; i < yearly.length; i++) {
    if (yearly[i].cumulativeCashflow >= 0) {
      if (i === 0) paybackYear = yearly[i].cumulativeCashflow / yearly[i].netCashflow;
      else {
        const prev = yearly[i - 1].cumulativeCashflow;
        const cur = yearly[i].cumulativeCashflow;
        paybackYear = i + (-prev / (cur - prev));
      }
      break;
    }
  }

  const totalNet = yearly[yearly.length - 1].cumulativeCashflow + ownAmount;
  const totalRevenue = yearly.reduce((s, y) => s + y.revenue, 0);
  const totalCosts = yearly.reduce((s, y) => s + y.essoxPayment + y.bankPayment + y.opex, 0);

  return {
    yearly,
    summary: {
      baseInvestment: x.baseInvestment, ownAmount, essoxAmount, bankAmount,
      essoxMonthly: Math.round(essoxMonthly), bankMonthly: Math.round(bankMonthly),
      totalMonthlyPayment: Math.round(essoxMonthly + bankMonthly),
      yearOneRevenue: Math.round(totalYearOneRevenue),
      yearOneNetMonthly: Math.round(yearly[0].monthlyCashflow),
      peakShavingYear: Math.round(peakShavingYear),
      arbitrageYear: Math.round(arbitrageYear),
      evYearBase: Math.round(evYearBase),
      fveYear: Math.round(fveYear),
      windYear: Math.round(windYear),
      paybackYear,
      totalRevenue: Math.round(totalRevenue),
      totalCosts: Math.round(totalCosts),
      totalProfit: Math.round(totalNet - ownAmount),
      positiveFromYear: yearly.find(y => y.monthlyCashflow > 0)?.year ?? null,
    }
  };
}

const fmtKc = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1000000) return `${(n / 1000000).toFixed(2).replace('.', ',')} mil. Kč`;
  if (abs >= 10000) return `${Math.round(n / 1000).toLocaleString('cs-CZ')} tis. Kč`;
  return `${Math.round(n).toLocaleString('cs-CZ')} Kč`;
};
const fmtKcFull = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return `${Math.round(n).toLocaleString('cs-CZ')} Kč`;
};
const fmtYears = (n) => n === null ? '> horizont' : `${n.toFixed(1).replace('.', ',')} let`;

function Slider({ label, value, onChange, min, max, step, unit, help, examples }) {

}

}

      <section className="methodology">
        <div className="container">
          <div className="section-header">
            <span className="eyebrow">Transparentní výpočet</span>
            <h2 className="display">Jak jsme se k číslům dostali</h2>
            <p>Žádné odhady. Každý vstup vychází z veřejně dostupných dat ERÚ, OTE, MPO a ČEZ Distribuce.</p>
          </div>

          <div className="method-grid">
            <div className="method-item">
              <h4>Peak Shaving</h4>
              <p className="method-item-claim">Úspora penále + snížení rezervovaného výkonu</p>
              <div className="method-formula">
                Roční úspora = (překročení kW × penále × měsíce) + (snížení kW × cena × 12)
              </div>
              <div className="method-source">
                Penále NN: <strong>1 683 Kč/kW/měs.</strong> · VN typicky 200–400 Kč/kW/měs.<br/>
                <a href="https://www.cezdistribuce.cz/cs/pro-zakazniky/potrebuji-vyresit/ceny-a-podminky/ceny-pri-prekroceni-rezervovaneho-prikonu-a-vykonu" target="_blank" rel="noopener">ČEZ Distribuce — ceník překročení</a>
              </div>
            </div>

            <div className="method-item">
              <h4>Energetická arbitráž</h4>
              <p className="method-item-claim">Nákup levně, využití draho — denní spread spotu</p>
              <div className="method-formula">
                Roční výnos = kapacita × % arb. × η(0,93) × cyklů × (špička − noc)
              </div>
              <div className="method-source">
                Průměr OTE 2025: <strong>2 000–2 300 Kč/MWh</strong>, denní spread 1,5–3 Kč/kWh<br/>
                <a href="https://www.ote-cr.cz/cs/kratkodobe-trhy/elektrina/denni-trh" target="_blank" rel="noopener">OTE — Denní trh</a> · <a href="https://www.spotmarketindex.cz/" target="_blank" rel="noopener">SpotMarketIndex.cz</a>
              </div>
            </div>

            <div className="method-item">
              <h4>EV nabíjení (s růstem v čase)</h4>
              <p className="method-item-claim">Roste s adopcí elektromobility v ČR</p>
              <div className="method-formula">
                Rok N = kapacita × % EV × η × 365 × (využití × (1+růst)^(N−1)) × marže × inflace × degradace
              </div>
              <div className="method-source">
                ČR 2025: <strong>60 000 EV, +30–60 % YoY</strong>, 7 574 dobíjecích bodů<br/>
                <a href="https://www.cistadoprava.cz/" target="_blank" rel="noopener">cistadoprava.cz</a> · <a href="https://mpo.gov.cz/assets/cz/energetika/strategicke-a-koncepcni-dokumenty/narodni-akcni-plan-pro-chytre-site/2024/6/Elektromobilita-predikce-aktualizace.pdf" target="_blank" rel="noopener">MPO — Predikce do 2045</a>
              </div>
            </div>

            <div className="method-item">
              <h4>FVE/Vítr přetoky</h4>
              <p className="method-item-claim">Hodnotový rozdíl výkup vs vlastní spotřeba</p>
              <div className="method-formula">
                Roční výnos = denní přetok × 365 × (cena vlastní − cena výkupu)
              </div>
              <div className="method-source">
                Aktuální výkup: <strong>~0,5 Kč/kWh</strong> · Cena dodávky VN 3,5–5 Kč/kWh<br/>
                Ceník ČEZ Prodej · ERÚ cenové rozhodnutí 12/2025
              </div>
            </div>

            <div className="method-item">
              <h4>Financování (anuita)</h4>
              <p className="method-item-claim">Standardní PMT vzorec pro měsíční splátku</p>
              <div className="method-formula">
                Splátka = (PV × r) / (1 − (1+r)^(−n)), kde r = sazba/12, n = let × 12
              </div>
              <div className="method-source">
                ESSOX: 5,5 % p.a. / 7 let / 0 % akontace · Úvěr: 8 % p.a. / 5 let<br/>
                <em>Skutečné podmínky stanoví ESSOX a banka po posouzení bonity.</em>
              </div>
            </div>

            <div className="method-item">
              <h4>Degradace a inflace</h4>
              <p className="method-item-claim">Realistický vývoj kapacity a cen v čase</p>
              <div className="method-formula">
                Degradace (LFP): 1,5 % ročně → po 15 letech ~80 % SOH<br/>
                Inflace cen energií: 3 % p.a. dlouhodobý průměr
              </div>
              <div className="method-source">
                LFP technologie · 6 000+ cyklů (100 % DOD / 80 % SOH)<br/>
                Distribuční ceny rostou 5–7 % p.a.
              </div>
            </div>
          </div>
        </div>
