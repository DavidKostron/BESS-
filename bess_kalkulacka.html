// Defaultní hodnoty vychází z nabídky TAMDA ÚSTÍ + veřejných statistik
const DEFAULTS = {

  fveSurplusDaily: 0,          // průměrný denní přetok v kWh

  fveSelfUsePrice: 4.5,        // Kč/kWh použití místo nákupu

  windSurplusDaily: 0,

  analysisHorizon: 15,         // let analýzy
};

// ============================================================================
// VÝPOČTY
// ============================================================================

function pmt(rate, nper, pv) {
  if (rate === 0) return pv / nper;
  const r = rate / 12 / 100;
  const n = nper * 12;
  return (pv * r) / (1 - Math.pow(1 + r, -n));
}

function calculateProjections(inputs) {
  const {
    bessCapacityKWh, bessPowerKW, baseInvestment,
    ownEquityPct, essoxPct, essoxRate, essoxYears, bankPct, bankRate, bankYears,
    reservedPowerKW, peakOverrunKW, overrunMonths, penaltyRate,
    reservedReductionKW, reservedPriceRate,
    arbitrageCapacityPct, buyPrice, sellPrice, arbitrageCyclesPerYear,
    evCapacityPct, evPrice, evEnergyCostKWh, evUtilizationStart, evGrowthPerYear,
    fveInstalledKWp, fveSurplusDaily, fveBuybackPrice, fveSelfUsePrice,
    windInstalledKW, windSurplusDaily, windBuybackPrice, windSelfUsePrice,
    opexPerYear, degradationPerYear, electricityInflation, analysisHorizon,
  } = inputs;

  // Investice a financování
  const essoxAmount = baseInvestment * (essoxPct / 100);
  const bankAmount = baseInvestment * (bankPct / 100);
  const ownAmount = baseInvestment * (ownEquityPct / 100);

  const essoxMonthly = essoxAmount > 0 ? pmt(essoxRate, essoxYears, essoxAmount) : 0;
  const bankMonthly = bankAmount > 0 ? pmt(bankRate, bankYears, bankAmount) : 0;

  // === 1) PEAK SHAVING (roční úspora) ===
  // Penále za překročení rezervovaného výkonu
  const penaltySavingsYear = peakOverrunKW * penaltyRate * overrunMonths;
  // Snížení rezervovaného výkonu (díky tomu, že BESS pokryje špičky)
  const reservedReductionSavingsYear = reservedReductionKW * reservedPriceRate * 12;
  const peakShavingYear = penaltySavingsYear + reservedReductionSavingsYear;

  // === 2) ARBITRÁŽ ===
  // Využitelná kapacita pro arbitráž
  const arbitrageUsableKWh = bessCapacityKWh * (arbitrageCapacityPct / 100) * 0.93; // η
  const arbitrageMarginPerKWh = sellPrice - buyPrice;
  const arbitrageYear = arbitrageUsableKWh * arbitrageCyclesPerYear * arbitrageMarginPerKWh;

  // === 3) EV NABÍJENÍ (rok 1, roste v čase) ===
  const evUsableKWh = bessCapacityKWh * (evCapacityPct / 100) * 0.93;
  // Předpoklad: kolikrát denně se EV kapacita "obrátí" závisí na využití
  const evMarginPerKWh = evPrice - evEnergyCostKWh;
  // evUtilizationStart % znamená % dnů v roce, kdy se kapacita plně využije
  const evYearBase = evUsableKWh * 365 * (evUtilizationStart / 100) * evMarginPerKWh;

  // === 4) FVE PŘETOKY ===
  const fveUpliftPerKWh = fveSelfUsePrice - fveBuybackPrice;
  const fveYear = fveSurplusDaily * 365 * fveUpliftPerKWh;

  // === 5) VĚTRNÁ ELEKTRÁRNA ===
  const windUpliftPerKWh = windSelfUsePrice - windBuybackPrice;
  const windYear = windSurplusDaily * 365 * windUpliftPerKWh;

  // === HOTÝ ROK 1 ===
  const totalYearOneRevenue = peakShavingYear + arbitrageYear + evYearBase + fveYear + windYear;

  // === PROJEKCE PO LETECH ===
  const yearly = [];
  let cumulativeCashflow = -ownAmount; // počáteční investice z vlastních

  for (let year = 1; year <= analysisHorizon; year++) {
    // Degradace baterie
    const degradationFactor = Math.pow(1 - degradationPerYear / 100, year - 1);
    // Inflace energií
    const inflationFactor = Math.pow(1 + electricityInflation / 100, year - 1);

    // Růst využití EV (sigmoidálně omezeno na 95%)
    const evUtilizationYear = Math.min(95, evUtilizationStart * Math.pow(1 + evGrowthPerYear / 100, year - 1));
    const evYearActual = evUsableKWh * 365 * (evUtilizationYear / 100) * evMarginPerKWh * inflationFactor * degradationFactor;

    const peakYearActual = peakShavingYear * inflationFactor;
    const arbitrageYearActual = arbitrageYear * inflationFactor * degradationFactor;
    const fveYearActual = fveYear * inflationFactor;
    const windYearActual = windYear * inflationFactor;

    const revenue = peakYearActual + arbitrageYearActual + evYearActual + fveYearActual + windYearActual;

    // Splátky aktivní jen dokud se splácí
    const essoxAnnual = year <= essoxYears ? essoxMonthly * 12 : 0;
    const bankAnnual = year <= bankYears ? bankMonthly * 12 : 0;
    const opex = opexPerYear * inflationFactor;

    const netCashflow = revenue - essoxAnnual - bankAnnual - opex;
    cumulativeCashflow += netCashflow;

    yearly.push({
      year,
      revenue: Math.round(revenue),
      peakShaving: Math.round(peakYearActual),
      arbitrage: Math.round(arbitrageYearActual),
      ev: Math.round(evYearActual),
      fve: Math.round(fveYearActual),
      wind: Math.round(windYearActual),
      essoxPayment: Math.round(essoxAnnual),
      bankPayment: Math.round(bankAnnual),
      opex: Math.round(opex),
      netCashflow: Math.round(netCashflow),
      cumulativeCashflow: Math.round(cumulativeCashflow),
      monthlyCashflow: Math.round(netCashflow / 12),
    });
  }

  // Návratnost (kdy se kumul. CF dostane do plusu)
  let paybackYear = null;
  for (let i = 0; i < yearly.length; i++) {
    if (yearly[i].cumulativeCashflow >= 0) {
      // Lineární interpolace pro přesnější odhad
      if (i === 0) {
        paybackYear = yearly[i].cumulativeCashflow / yearly[i].netCashflow;
      } else {
        const prevCum = yearly[i - 1].cumulativeCashflow;
        const thisCum = yearly[i].cumulativeCashflow;
        const fraction = -prevCum / (thisCum - prevCum);
        paybackYear = (i) + fraction;
      }
      break;
    }
  }

  // ROI a IRR (zjednodušeně)
  const totalNetCashflow = yearly[yearly.length - 1].cumulativeCashflow + ownAmount;
  const totalRevenue = yearly.reduce((s, y) => s + y.revenue, 0);
  const totalCosts = yearly.reduce((s, y) => s + y.essoxPayment + y.bankPayment + y.opex, 0);
  const roi = ownAmount > 0 ? ((totalNetCashflow - ownAmount) / ownAmount) * 100 : null;

  return {
    yearly,
    summary: {
      baseInvestment,
      ownAmount,
      essoxAmount,
      bankAmount,
      essoxMonthly: Math.round(essoxMonthly),
      bankMonthly: Math.round(bankMonthly),
      totalMonthlyPayment: Math.round(essoxMonthly + bankMonthly),
      yearOneRevenue: Math.round(totalYearOneRevenue),
      yearOneMonthly: Math.round(totalYearOneRevenue / 12),
      yearOneNetMonthly: Math.round(yearly[0].monthlyCashflow),
      peakShavingYear: Math.round(peakShavingYear),
      arbitrageYear: Math.round(arbitrageYear),
      evYearBase: Math.round(evYearBase),
      fveYear: Math.round(fveYear),
      windYear: Math.round(windYear),
      paybackYear,
      totalRevenue: Math.round(totalRevenue),
      totalCosts: Math.round(totalCosts),
      totalProfit: Math.round(totalNetCashflow - ownAmount),
      roi,
    }
  };
}

// ============================================================================
// FORMÁTOVÁNÍ
// ============================================================================

const fmtKc = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1000000) return `${(n / 1000000).toFixed(2).replace('.', ',')} mil. Kč`;
  if (abs >= 10000) return `${Math.round(n / 1000).toLocaleString('cs-CZ')} tis. Kč`;
  return `${Math.round(n).toLocaleString('cs-CZ')} Kč`;
};
const fmtKcFull = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return `${Math.round(n).toLocaleString('cs-CZ')} Kč`;
};
const fmtPct = (n) => `${n.toFixed(1).replace('.', ',')} %`;
const fmtYears = (n) => n === null ? 'nenastane v horizontu' : `${n.toFixed(1).replace('.', ',')} let`;

          {examples && <div style={{ fontStyle: 'italic', marginTop: '2px' }}>{examples}</div>}
        </div>

}

function BessCalculator() {

    setInputs(prev => ({ ...prev, ...presets[key] }));

    medium: { label: 'Střední 1 200 kWh', bessCapacityKWh: 1200, bessPowerKW: 600, baseInvestment: 9500000 },
    standard: { label: 'TAMDA 2 411 kWh', bessCapacityKWh: 2411, bessPowerKW: 1250, baseInvestment: 17550000 },
    large: { label: 'Velký 4 000 kWh', bessCapacityKWh: 4000, bessPowerKW: 2000, baseInvestment: 28500000 },
  };

  const applySizing = (key) => {

  };

  const results = useMemo(() => calculateProjections(inputs), [inputs]);
  const { yearly, summary } = results;

  // Data pro stacked chart skladby výnosů

    { name: 'Arbitráž', value: summary.arbitrageYear, color: '#3A8246' },

    { name: 'FVE přetoky', value: summary.fveYear, color: '#D4A93C' },
    { name: 'Vítr přetoky', value: summary.windYear, color: '#8B7355' },
  ].filter(d => d.value > 0);

  return (
    <div style={{
      fontFamily: '"Inter", -apple-system, BlinkMacSystemFont, sans-serif',
      background: COLORS.bg,
      minHeight: '100vh',
      padding: '20px',
      color: COLORS.text,
    }}>
      <div style={{ maxWidth: '1400px', margin: '0 auto' }}>

        {/* HEADER */}
        <div style={{
          background: COLORS.primary,
          color: '#fff',
          padding: '32px 36px',
          borderRadius: '12px',

        }}>

          </div>

            Bateriové úložiště BESS

          />

            big
            label="Měsíční splátka"
            value={fmtKc(summary.totalMonthlyPayment)}
            sublabel={`ESSOX ${fmtKc(summary.essoxMonthly)} + úvěr ${fmtKc(summary.bankMonthly)}`}
          />
        </div>

        {/* HLAVNÍ LAYOUT: vstupy vlevo, výsledky vpravo */}
