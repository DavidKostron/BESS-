<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cenová nabídka BESS — Bateriové úložiště BRES-2400-1250</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    /* Paleta z PDF nabídky */
    --bg-page: #F4F1E8;        /* krémové pozadí jako v PDF */
    --bg-light: #F9F7EF;
    --paper: #FFFFFF;
    --primary: #1F4A2E;        /* hlavní tmavá zelená */
    --primary-dark: #0F2D1B;
    --primary-light: #2D6A41;
    --accent: #6FA86C;
    --accent-soft: #D9E8D5;
    --green-bg: #1F4A2E;
    --green-bg-dark: #163821;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --border: #E5E0D0;
    --border-soft: #EFEAD8;
    --positive: #2D6A41;
    --negative: #C42E2E;
    --amber: #D4A93C;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .num { font-variant-numeric: tabular-nums; }
  a { color: var(--primary); }

  /* ============ STRÁNKOVÝ SYSTÉM ============ */
  /* Každá "stránka" simuluje stránku PDF — bílý arch s číslem stránky */
  .page {
    max-width: 1280px;
    margin: 24px auto;
    background: var(--paper);
    border-radius: 12px;
    box-shadow: 0 2px 24px rgba(15, 45, 27, 0.08);
    padding: 56px 64px;
    position: relative;
    overflow: hidden;
  }
  .page-header {
    position: absolute;
    top: 24px; left: 64px; right: 64px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
  }
  .page-footer {
    position: absolute;
    bottom: 24px; left: 64px; right: 64px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
  }
  .page-footer .page-num {
    color: var(--primary); font-weight: 700;
  }
  .page-body {
    margin-top: 48px;
    margin-bottom: 40px;
  }
  @media (max-width: 768px) {
    .page { padding: 80px 24px 64px; margin: 12px; }
    .page-header, .page-footer { left: 24px; right: 24px; }
  }

  /* ============ EYEBROW (jako "MODEL BRES..." v PDF) ============ */
  .eyebrow-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent-soft);
    color: var(--primary);
    padding: 6px 14px; border-radius: 100px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .eyebrow-pill::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary);
  }
  .eyebrow-label {
    display: inline-block;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 700; color: var(--primary);
    margin-bottom: 16px;
  }

  /* ============ TYPOGRAFIE ============ */
  h1.display {
    font-weight: 800; font-size: clamp(40px, 5.5vw, 64px);
    line-height: 1.0; letter-spacing: -0.035em;
    margin: 0 0 16px;
  }
  h1.display em {
    font-style: normal; color: var(--primary);
  }
  h2.display {
    font-weight: 800; font-size: clamp(28px, 3.5vw, 40px);
    line-height: 1.05; letter-spacing: -0.025em;
    margin: 0 0 16px;
  }
  h2.display em {
    font-style: normal; color: var(--primary);
  }
  h3.display {
    font-weight: 800; font-size: 24px;
    line-height: 1.1; letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  .lead {
    font-size: 17px; color: var(--text-muted);
    line-height: 1.55; max-width: 640px;
    margin: 0 0 32px;
  }

  /* ============ STR 01 — HERO (Cenová nabídka) ============ */
  .hero-page { min-height: 720px; }
  .hero-grid {
    display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 48px; align-items: center;
  }
  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; } }
  .hero-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 32px;
  }
  .hero-stat {
    background: var(--bg-light);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .hero-stat-value {
    font-size: 28px; font-weight: 800; color: var(--primary);
    letter-spacing: -0.025em; line-height: 1;
  }
  .hero-stat-value sup {
    font-size: 14px; font-weight: 700; opacity: 0.7;
    margin-left: 2px; vertical-align: super;
  }
  .hero-stat-label {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600; margin-top: 8px;
  }
  .hero-illustration {
    background: linear-gradient(135deg, #ECF2EA 0%, #DDE9DA 100%);
    border-radius: 16px; padding: 32px;
    min-height: 360px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero-illustration::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(31,74,46,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(31,74,46,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  .container-svg {
    position: relative; z-index: 1; width: 100%;
  }
  .hero-meta {
    display: flex; gap: 16px;
    padding-top: 24px; margin-top: 32px;
    border-top: 1px solid var(--border-soft);
    flex-wrap: wrap;
  }
  .hero-meta-item { font-size: 13px; color: var(--text-muted); }
  .hero-meta-item strong { color: var(--text); font-weight: 600; }

  /* ============ STR 02 — IDENTIFIKACE ============ */
  .id-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 24px;
  }
  @media (max-width: 768px) { .id-grid { grid-template-columns: 1fr 1fr; } }
  .id-cell {
    background: var(--bg-light); border: 1px solid var(--border-soft);
    padding: 14px 18px; border-radius: 10px;
  }
  .id-cell-label {
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600; margin-bottom: 4px;
  }
  .id-cell-value { font-size: 15px; font-weight: 700; color: var(--text); }
  .parties-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;
  }
  @media (max-width: 768px) { .parties-grid { grid-template-columns: 1fr; } }
  .party {
    border: 1px solid var(--border); border-radius: 12px;
    padding: 20px 24px;
  }
  .party.supplier { background: white; }
  .party.customer { background: var(--primary); color: white; }
  .party-label {
    font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600; opacity: 0.7; margin-bottom: 6px;
  }
  .party-name { font-size: 19px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.015em; }
  .party-detail { font-size: 13px; line-height: 1.8; }
  .party-detail strong { font-weight: 600; min-width: 60px; display: inline-block; opacity: 0.9; }

  /* ============ SCOPE OF DELIVERY ============ */
  .scope-card {
    background: var(--primary); color: white;
    border-radius: 14px; padding: 28px 32px;
  }
  .scope-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 700; margin-bottom: 18px;
  }
  .scope-title::before {
    content: '✓'; display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; background: var(--accent); color: var(--primary-dark);
    border-radius: 6px; font-weight: 800;
  }
  .scope-list {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 24px;
  }
  @media (max-width: 768px) { .scope-list { grid-template-columns: 1fr; } }
  .scope-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13.5px; padding: 6px 0;
  }
  .scope-item::before {
    content: '✓';
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 4px;
    background: var(--accent); color: var(--primary-dark);
    font-size: 11px; font-weight: 800; flex-shrink: 0;
  }
  .scope-note {
    font-size: 11px; opacity: 0.7; margin-top: 18px;
    padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.15);
    font-style: italic;
  }

  /* ============ BENEFITS (str 03) ============ */
  .benefit-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  @media (max-width: 768px) { .benefit-grid { grid-template-columns: 1fr; } }
  .benefit-item {
    background: var(--bg-light); border: 1px solid var(--border-soft);
    border-radius: 14px; padding: 28px;
    border-left: 4px solid var(--primary);
    position: relative;
  }
  .benefit-num-label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--primary); font-weight: 700; margin-bottom: 14px;
  }
  .benefit-name {
    font-size: 24px; font-weight: 800; letter-spacing: -0.02em;
    margin: 0 0 10px; color: var(--text);
  }
  .benefit-desc {
    font-size: 14px; color: var(--text-muted); line-height: 1.6;
    margin: 0 0 18px;
  }
  .benefit-tag {
    display: inline-block;
    background: var(--primary); color: white;
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.02em;
  }
  .benefit-source {
    font-size: 11px; color: var(--text-muted);
    margin-top: 14px; line-height: 1.5;
  }
  .benefit-source a {
    color: var(--primary); border-bottom: 1px dotted var(--primary); text-decoration: none;
  }

  /* ============ KALKULAČKA (str 04) ============ */
  .calc-grid {
    display: grid; grid-template-columns: 440px 1fr; gap: 20px;
    align-items: start;
  }
  @media (max-width: 1024px) { .calc-grid { grid-template-columns: 1fr; } }
  .calc-card {
    background: var(--bg-light); border-radius: 12px; padding: 20px 22px;
    border: 1px solid var(--border-soft);
    margin-bottom: 14px;
    border-left: 4px solid var(--primary);
  }
  .calc-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; gap: 12px;
  }
  .calc-card h3 {
    margin: 0; font-size: 12px; font-weight: 700; color: var(--primary);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .calc-badge {
    background: var(--accent-soft); color: var(--primary);
    padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700;
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .slider-block { margin-bottom: 14px; }
  .slider-label-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .slider-label { font-size: 12px; font-weight: 600; color: var(--text); }
  .slider-value {
    font-size: 13px; font-weight: 700; color: var(--primary);
    background: white; padding: 2px 9px; border-radius: 4px;
    font-variant-numeric: tabular-nums;
    border: 1px solid var(--border-soft);
  }
  input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; }
  .slider-help { font-size: 10.5px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
  .slider-help em { font-style: italic; }
  input[type="number"] {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; font-family: inherit; background: white;
  }
  .num-row { display: flex; gap: 8px; align-items: center; }
  .num-row span { font-size: 12px; color: var(--text-muted); }
  .preset-row { margin-bottom: 12px; }
  .preset-btn {
    padding: 5px 11px; font-size: 11px; font-weight: 600;
    background: transparent; color: var(--primary);
    border: 1.5px solid var(--primary); border-radius: 16px;
    cursor: pointer; margin-right: 5px; margin-bottom: 5px;
    transition: all 0.15s; font-family: inherit;
  }
  .preset-btn.active { background: var(--primary); color: white; }
  .calc-divider { height: 1px; background: var(--border-soft); margin: 14px 0; }

  /* ============ RESULT PANELS (str 04 vpravo) ============ */
  .panel {
    background: white; border-radius: 14px; padding: 24px 26px;
    margin-bottom: 14px; border: 1px solid var(--border-soft);
  }
  .panel h3 {
    margin: 0 0 4px; font-size: 18px; font-weight: 800;
    color: var(--primary-dark); letter-spacing: -0.015em;
  }
  .panel-sub { font-size: 12.5px; color: var(--text-muted); margin-bottom: 16px; }

  .breakdown-row { margin-bottom: 11px; }
  .breakdown-label {
    display: flex; justify-content: space-between;
    font-size: 13px; margin-bottom: 4px;
  }
  .breakdown-name { font-weight: 600; }
  .breakdown-value { font-variant-numeric: tabular-nums; font-weight: 700; }
  .breakdown-pct { color: var(--text-muted); font-weight: 400; margin-left: 6px; }
  .breakdown-bar { height: 8px; background: var(--bg-light); border-radius: 4px; overflow: hidden; }
  .breakdown-bar-fill { height: 100%; transition: width 0.4s; }
  .color-dot {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; margin-right: 8px; vertical-align: middle;
  }

  table { width: 100%; font-size: 12px; border-collapse: collapse; }
  thead tr { background: var(--bg-light); color: var(--primary); }
  th { padding: 9px 6px; text-align: right; font-weight: 700; }
  th:first-child { text-align: left; }
  td { padding: 7px 6px; text-align: right; font-variant-numeric: tabular-nums; }
  td:first-child { text-align: left; font-weight: 600; }
  tbody tr { border-bottom: 1px solid var(--border-soft); }

  .warning-box {
    background: #FFF4E5; border: 1px solid var(--amber);
    padding: 10px 12px; border-radius: 6px;
    font-size: 11px; color: #8B6B1F; margin-top: 8px;
  }

  /* ============ RESULT HERO (velký výsledek) ============ */
  .result-hero {
    background: var(--primary); color: white;
    border-radius: 16px; padding: 36px 40px;
    margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .result-hero::before {
    content: ''; position: absolute;
    top: -50%; right: -10%; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(111,168,108,0.15), transparent 60%);
    pointer-events: none;
  }
  .result-hero > * { position: relative; z-index: 1; }
  .result-hero-label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent); font-weight: 700; margin-bottom: 12px;
  }
  .result-hero-value {
    font-size: clamp(56px, 8vw, 88px); font-weight: 900;
    line-height: 1; letter-spacing: -0.035em; margin: 0;
    color: white;
  }
  .result-hero-cf {
    font-size: 15px; color: rgba(255,255,255,0.8); margin: 16px 0 0;
    line-height: 1.5;
  }
  .result-hero-cf strong { color: var(--accent); font-weight: 700; }
  .result-hero-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    margin-top: 28px; padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  @media (max-width: 600px) { .result-hero-grid { grid-template-columns: 1fr; gap: 14px; } }
  .result-hero-grid-label {
    font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;
    opacity: 0.6; font-weight: 600; margin-bottom: 6px;
  }
  .result-hero-grid-value {
    font-size: 24px; font-weight: 800; line-height: 1; letter-spacing: -0.02em;
  }
  .result-hero-grid-sub {
    font-size: 11px; opacity: 0.6; margin-top: 4px;
  }
  .status-line {
    margin-top: 18px; padding: 10px 14px;
    background: rgba(255,255,255,0.08); border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 12.5px; display: flex; align-items: center; gap: 10px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-good { color: var(--accent); }
  .status-good .status-dot { background: var(--accent); }
  .status-warning { color: #F4D03F; }
  .status-warning .status-dot { background: #F4D03F; }
  .status-bad { color: #FF6B6B; }
  .status-bad .status-dot { background: #FF6B6B; }

  /* ============ STR 05 — TECHNOLOGIE (zelené pozadí jako v PDF) ============ */
  .tech-page {
    background: var(--green-bg);
    color: white;
  }
  .tech-page .page-header,
  .tech-page .page-footer {
    color: rgba(255,255,255,0.6);
    border-color: rgba(255,255,255,0.12);
  }
  .tech-page .page-footer .page-num { color: var(--accent); }
  .tech-page .eyebrow-label { color: var(--accent); }
  .tech-page h1.display em,
  .tech-page h2.display em { color: var(--accent); }
  .tech-page .lead { color: rgba(255,255,255,0.7); }

  .tech-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 32px;
  }
  @media (max-width: 768px) { .tech-stats { grid-template-columns: repeat(2, 1fr); } }
  .tech-stat {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 22px 24px; border-radius: 12px;
  }
  .tech-stat-value {
    font-size: 36px; font-weight: 800; color: white;
    line-height: 1; margin-bottom: 6px; letter-spacing: -0.025em;
  }
  .tech-stat-label { font-size: 12px; color: rgba(255,255,255,0.75); font-weight: 500; }

  .tech-params-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 32px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 28px 32px;
  }
  @media (max-width: 600px) { .tech-params-grid { grid-template-columns: 1fr; } }
  .tech-params-section {
    grid-column: 1 / -1;
    font-size: 12px; font-weight: 700; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    padding-top: 16px; padding-bottom: 4px;
  }
  .tech-params-section:first-child { padding-top: 0; }
  .tech-param-row {
    display: flex; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
  }
  .tech-param-row span:first-child { opacity: 0.7; }
  .tech-param-row span:last-child { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ============ STR 06 — HARMONOGRAM ============ */
  .timeline {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 16px; margin: 32px 0;
  }
  @media (max-width: 900px) {
    .timeline { grid-template-columns: 1fr; }
    .timeline-step::after { display: none !important; }
  }
  .timeline-step {
    background: var(--bg-light);
    border: 1px solid var(--border-soft);
    padding: 22px 18px; border-radius: 12px;
    position: relative;
  }
  .timeline-step::after {
    content: '→'; position: absolute;
    right: -14px; top: 32px;
    color: var(--primary); font-size: 22px; font-weight: 700; z-index: 2;
  }
  .timeline-step:last-child::after { display: none; }
  .timeline-step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: white;
    font-weight: 800; font-size: 14px; margin-bottom: 12px;
  }
  .timeline-step-title { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .timeline-step-detail { font-size: 11.5px; color: var(--text-muted); line-height: 1.4; margin-bottom: 10px; }
  .timeline-step-time {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--primary); text-transform: uppercase;
    background: var(--accent-soft); padding: 4px 8px; border-radius: 4px;
    display: inline-block;
  }

  .warranty-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 12px; margin-top: 16px;
  }
  @media (max-width: 768px) { .warranty-grid { grid-template-columns: repeat(2, 1fr); } }
  .warranty-card {

<script type="text/babel">
'use strict';
const { useState, useMemo, useEffect } = React;
const {
  LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid,
  Tooltip, Legend, ResponsiveContainer, ReferenceLine, ComposedChart, Area
} = Recharts;

/* ===========================================================
   DEFAULTS, PRESETS, VÝPOČTY — kopie z původní JSX kalkulačky
   =========================================================== */
const DEFAULTS = {
  bessCapacityKWh: 2411, bessPowerKW: 1250, baseInvestment: 17550000,
  ownEquityPct: 0, essoxPct: 70, essoxRate: 5.5, essoxYears: 7,

  reservedPowerKW: 800, peakOverrunKW: 250, overrunMonths: 6,
  penaltyRate: 350, reservedReductionKW: 200, reservedPriceRate: 195,
  arbitrageCapacityPct: 60, buyPrice: 1.5, sellPrice: 3.2, arbitrageCyclesPerYear: 320,
  evCapacityPct: 15, evPrice: 11, evEnergyCostKWh: 1.8,
  evUtilizationStart: 35, evGrowthPerYear: 25,
  fveInstalledKWp: 0, fveSurplusDaily: 0, fveBuybackPrice: 0.5, fveSelfUsePrice: 4.5,
  windInstalledKW: 0, windSurplusDaily: 0, windBuybackPrice: 0.5, windSelfUsePrice: 4.5,
  opexPerYear: 80000, degradationPerYear: 1.5, electricityInflation: 3, analysisHorizon: 15,
};

const BUSINESS_PRESETS = {
  truhlarna: { label: 'Truhlárna', reservedPowerKW: 250, peakOverrunKW: 80, overrunMonths: 6, penaltyRate: 350, reservedReductionKW: 50, evCapacityPct: 10, arbitrageCapacityPct: 70 },
  strojirna: { label: 'Strojírna', reservedPowerKW: 800, peakOverrunKW: 250, overrunMonths: 8, penaltyRate: 350, reservedReductionKW: 200, evCapacityPct: 15, arbitrageCapacityPct: 60 },
  potravinarstvi: { label: 'Potravinářství', reservedPowerKW: 500, peakOverrunKW: 150, overrunMonths: 10, penaltyRate: 350, reservedReductionKW: 100, evCapacityPct: 10, arbitrageCapacityPct: 65 },
  logistika: { label: 'Logistika + kamiony', reservedPowerKW: 400, peakOverrunKW: 100, overrunMonths: 4, penaltyRate: 350, reservedReductionKW: 80, evCapacityPct: 50, evPrice: 17, arbitrageCapacityPct: 30 },
  plast: { label: 'Plastikářství', reservedPowerKW: 700, peakOverrunKW: 200, overrunMonths: 9, penaltyRate: 350, reservedReductionKW: 150, evCapacityPct: 10, arbitrageCapacityPct: 65 },
};

const SIZING_PRESETS = {
  small: { label: '500 kWh', bessCapacityKWh: 500, bessPowerKW: 250, baseInvestment: 4600000 },
  medium: { label: '1 200 kWh', bessCapacityKWh: 1200, bessPowerKW: 600, baseInvestment: 9500000 },
  standard: { label: '2 411 kWh', bessCapacityKWh: 2411, bessPowerKW: 1250, baseInvestment: 17550000 },
  large: { label: '4 000 kWh', bessCapacityKWh: 4000, bessPowerKW: 2000, baseInvestment: 28500000 },
};

function pmt(rate, nper, pv) {
  if (rate === 0) return pv / nper;
  const r = rate / 12 / 100;
  const n = nper * 12;
  return (pv * r) / (1 - Math.pow(1 + r, -n));
}

function calculateProjections(inputs) {
  const x = inputs;
  const essoxAmount = x.baseInvestment * (x.essoxPct / 100);
  const bankAmount = x.baseInvestment * (x.bankPct / 100);
  const ownAmount = x.baseInvestment * (x.ownEquityPct / 100);
  const essoxMonthly = essoxAmount > 0 ? pmt(x.essoxRate, x.essoxYears, essoxAmount) : 0;
  const bankMonthly = bankAmount > 0 ? pmt(x.bankRate, x.bankYears, bankAmount) : 0;

  const peakPenaltySavings = x.peakOverrunKW * x.penaltyRate * x.overrunMonths;
  const reservedSavings = x.reservedReductionKW * x.reservedPriceRate * 12;
  const peakShavingYear = peakPenaltySavings + reservedSavings;

  const arbitrageUsable = x.bessCapacityKWh * (x.arbitrageCapacityPct / 100) * 0.93;
  const arbitrageMargin = x.sellPrice - x.buyPrice;
  const arbitrageYear = arbitrageUsable * x.arbitrageCyclesPerYear * arbitrageMargin;

  const evUsable = x.bessCapacityKWh * (x.evCapacityPct / 100) * 0.93;
  const evMargin = x.evPrice - x.evEnergyCostKWh;
  const evYearBase = evUsable * 365 * (x.evUtilizationStart / 100) * evMargin;

  const fveYear = x.fveSurplusDaily * 365 * (x.fveSelfUsePrice - x.fveBuybackPrice);
  const windYear = x.windSurplusDaily * 365 * (x.windSelfUsePrice - x.windBuybackPrice);
  const totalYearOneRevenue = peakShavingYear + arbitrageYear + evYearBase + fveYear + windYear;

  const yearly = [];
  let cumulative = -ownAmount;

  for (let year = 1; year <= x.analysisHorizon; year++) {
    const deg = Math.pow(1 - x.degradationPerYear / 100, year - 1);
    const inf = Math.pow(1 + x.electricityInflation / 100, year - 1);
    const evUtil = Math.min(95, x.evUtilizationStart * Math.pow(1 + x.evGrowthPerYear / 100, year - 1));
    const evY = evUsable * 365 * (evUtil / 100) * evMargin * inf * deg;
    const peakY = peakShavingYear * inf;
    const arbY = arbitrageYear * inf * deg;
    const fveY = fveYear * inf;
    const windY = windYear * inf;
    const revenue = peakY + arbY + evY + fveY + windY;
    const essoxAnnual = year <= x.essoxYears ? essoxMonthly * 12 : 0;
    const bankAnnual = year <= x.bankYears ? bankMonthly * 12 : 0;
    const opex = x.opexPerYear * inf;
    const netCF = revenue - essoxAnnual - bankAnnual - opex;
    cumulative += netCF;
    yearly.push({
      year, revenue: Math.round(revenue),
      peakShaving: Math.round(peakY), arbitrage: Math.round(arbY),
      ev: Math.round(evY), fve: Math.round(fveY), wind: Math.round(windY),
      essoxPayment: Math.round(essoxAnnual), bankPayment: Math.round(bankAnnual),
      opex: Math.round(opex), netCashflow: Math.round(netCF),
      cumulativeCashflow: Math.round(cumulative),
      monthlyCashflow: Math.round(netCF / 12),
    });
  }

  let paybackYear = null;
  for (let i = 0; i < yearly.length; i++) {
    if (yearly[i].cumulativeCashflow >= 0) {
      if (i === 0) paybackYear = yearly[i].cumulativeCashflow / yearly[i].netCashflow;
      else {
        const prev = yearly[i - 1].cumulativeCashflow;
        const cur = yearly[i].cumulativeCashflow;
        paybackYear = i + (-prev / (cur - prev));
      }
      break;
    }
  }

  const totalNet = yearly[yearly.length - 1].cumulativeCashflow + ownAmount;
  const totalRevenue = yearly.reduce((s, y) => s + y.revenue, 0);
  const totalCosts = yearly.reduce((s, y) => s + y.essoxPayment + y.bankPayment + y.opex, 0);

  return {
    yearly,
    summary: {
      baseInvestment: x.baseInvestment, ownAmount, essoxAmount, bankAmount,
      essoxMonthly: Math.round(essoxMonthly), bankMonthly: Math.round(bankMonthly),
      totalMonthlyPayment: Math.round(essoxMonthly + bankMonthly),
      yearOneRevenue: Math.round(totalYearOneRevenue),
      yearOneNetMonthly: Math.round(yearly[0].monthlyCashflow),
      peakShavingYear: Math.round(peakShavingYear),
      arbitrageYear: Math.round(arbitrageYear),
      evYearBase: Math.round(evYearBase),
      fveYear: Math.round(fveYear),
      windYear: Math.round(windYear),
      paybackYear,
      totalRevenue: Math.round(totalRevenue),
      totalCosts: Math.round(totalCosts),
      totalProfit: Math.round(totalNet - ownAmount),
      positiveFromYear: yearly.find(y => y.monthlyCashflow > 0)?.year ?? null,
    }
  };
}

const fmtKc = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1000000) return `${(n / 1000000).toFixed(2).replace('.', ',')} mil. Kč`;
  if (abs >= 10000) return `${Math.round(n / 1000).toLocaleString('cs-CZ')} tis. Kč`;
  return `${Math.round(n).toLocaleString('cs-CZ')} Kč`;
};
const fmtKcFull = (n) => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return `${Math.round(n).toLocaleString('cs-CZ')} Kč`;
};
const fmtYears = (n) => n === null ? '> horizont' : `${n.toFixed(1).replace('.', ',')} let`;

      <section className="page" id="method">

          <h2 className="display">Jak jsme se k číslům <em>dostali</em></h2>
          <p className="lead">
            Žádné odhady. Každý vstup vychází z veřejně dostupných dat ERÚ, OTE, MPO a ČEZ Distribuce. Zde jsou vzorce a primární zdroje.
          </p>

          <div className="method-grid">
            <div className="method-item">
              <h4>Peak Shaving</h4>
              <p className="method-item-claim">Úspora penále + snížení rezervovaného výkonu</p>
              <div className="method-formula">
                Roční úspora = (překročení kW × penále × měsíce)<br/>+ (snížení kW × cena × 12 měsíců)
              </div>
              <div className="method-source">
                Penále NN: <strong>1 683 Kč/kW/měs.</strong> · VN typicky 200–400 Kč/kW/měs.<br/>
                <a href="https://www.cezdistribuce.cz/cs/pro-zakazniky/potrebuji-vyresit/ceny-a-podminky/ceny-pri-prekroceni-rezervovaneho-prikonu-a-vykonu" target="_blank" rel="noopener">ČEZ Distribuce — ceník překročení</a>
              </div>
            </div>

            <div className="method-item">
              <h4>Energetická arbitráž</h4>
              <p className="method-item-claim">Nákup levně, využití draho — denní spread spotu</p>
              <div className="method-formula">
                Roční výnos = kapacita × % arb. × η(0,93) ×<br/>cyklů × (cena_špička − cena_noc)
              </div>
              <div className="method-source">
                Průměr OTE 2025: <strong>2 000–2 300 Kč/MWh</strong>, denní spread 1,5–3 Kč/kWh<br/>
                <a href="https://www.ote-cr.cz/cs/kratkodobe-trhy/elektrina/denni-trh" target="_blank" rel="noopener">OTE — Denní trh</a>
              </div>
            </div>

            <div className="method-item">
              <h4>EV nabíjení (s růstem v čase)</h4>
              <p className="method-item-claim">Roste s adopcí elektromobility v ČR</p>
              <div className="method-formula">
                Rok N = kapacita × % EV × η × 365 ×<br/>(využití × (1+růst)^(N−1)) × marže<br/>× inflace × degradace
              </div>
              <div className="method-source">
                ČR 2025: <strong>60 000 EV, +30–60 % YoY</strong><br/>
                <a href="https://www.cistadoprava.cz/" target="_blank" rel="noopener">cistadoprava.cz</a> · <a href="https://mpo.gov.cz/assets/cz/energetika/strategicke-a-koncepcni-dokumenty/narodni-akcni-plan-pro-chytre-site/2024/6/Elektromobilita-predikce-aktualizace.pdf" target="_blank" rel="noopener">MPO predikce do 2045</a>
              </div>
            </div>

            <div className="method-item">
              <h4>FVE / vítr přetoky</h4>
              <p className="method-item-claim">Hodnotový rozdíl výkup vs vlastní spotřeba</p>
              <div className="method-formula">
                Roční výnos = denní přetok × 365 ×<br/>(cena vlastní − cena výkupu)
              </div>
              <div className="method-source">
                Aktuální výkup: <strong>~0,5 Kč/kWh</strong> · Cena dodávky VN 3,5–5 Kč/kWh<br/>
                Ceník ČEZ Prodej · ERÚ cenové rozhodnutí 12/2025
              </div>
            </div>

            <div className="method-item">
              <h4>Financování (anuita)</h4>
              <p className="method-item-claim">Standardní PMT vzorec pro měsíční splátku</p>
              <div className="method-formula">
                Splátka = (PV × r) / (1 − (1+r)^(−n))<br/>kde r = sazba / 12, n = let × 12
              </div>
              <div className="method-source">
                ESSOX: 5,5 % p.a. / 7 let / 0 % akontace<br/>
                Úvěr: 8 % p.a. / 5 let<br/>
                <em>Skutečné podmínky stanoví ESSOX a banka.</em>
              </div>
            </div>

            <div className="method-item">
              <h4>Degradace a inflace</h4>
              <p className="method-item-claim">Realistický vývoj kapacity a cen v čase</p>
              <div className="method-formula">
                Degradace LFP: 1,5 % ročně<br/>→ po 15 letech ~80 % SOH<br/>Inflace energií: 3 % p.a. dlouhodobě
              </div>
              <div className="method-source">
                LFP technologie · 6 000+ cyklů (100 % DOD / 80 % SOH)<br/>
                Distribuční ceny rostou 5–7 % p.a.
              </div>
            </div>
          </div>
        </div>
